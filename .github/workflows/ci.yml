name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect workspace
        id: ws
        run: echo "present=$([ -f pnpm-lock.yaml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        if: steps.ws.outputs.present == 'true'
      - uses: actions/setup-node@v4
        if: steps.ws.outputs.present == 'true'
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        if: steps.ws.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build
        if: steps.ws.outputs.present == 'true'
        run: pnpm -r build
      - name: Test
        if: steps.ws.outputs.present == 'true'
        run: pnpm -r test
      - name: No workspace yet
        if: steps.ws.outputs.present != 'true'
        run: echo "No pnpm workspace yet - CI green by definition."
